name: Make docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - image: ghcr.io/wdmjieyao/beszel/beszel
            dockerfile: ./internal/dockerfile_hub
            tags: |
              type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
              type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=semver,pattern={{major}}
              type=sha,format=short

          - image: ghcr.io/wdmjieyao/beszel/beszel-agent
            dockerfile: ./internal/dockerfile_agent
            tags: |
              type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
              type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=semver,pattern={{major}}
              type=sha,format=short

          - image: ghcr.io/wdmjieyao/beszel/beszel-agent
            dockerfile: ./internal/dockerfile_agent_alpine
            tags: |
              type=raw,value=alpine,enable=${{ github.ref == 'refs/heads/main' }}
              type=semver,pattern={{version}}-alpine
              type=semver,pattern={{major}}.{{minor}}-alpine
              type=semver,pattern={{major}}-alpine
              type=sha,format=short,suffix=-alpine

          - image: ghcr.io/wdmjieyao/beszel/beszel-agent-nvidia
            dockerfile: ./internal/dockerfile_agent_nvidia
            platforms: linux/amd64
            tags: |
              type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
              type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=semver,pattern={{major}}
              type=sha,format=short

          - image: ghcr.io/wdmjieyao/beszel/beszel-agent-intel
            dockerfile: ./internal/dockerfile_agent_intel
            platforms: linux/amd64
            tags: |
              type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
              type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=semver,pattern={{major}}
              type=sha,format=short

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --no-save --cwd ./internal/site

      - name: Build site
        run: bun run --cwd ./internal/site build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: ${{ matrix.tags }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms || 'linux/amd64,linux/arm64,linux/arm/v7' }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
